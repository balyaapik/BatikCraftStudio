name: Build desktop applications

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release version, for example v0.1.0"
        required: false
        type: string
  pull_request:
    paths:
      - ".github/workflows/build-desktop.yml"
      - "packaging/**"
      - "scripts/build_desktop.py"
      - "src/**"
      - "pyproject.toml"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            label: Windows x64 installer
            artifact: BatikCraftStudio-Installer-Windows-x64
          - os: ubuntu-22.04
            label: Linux x64 installer
            artifact: BatikCraftStudio-Installer-Linux-x64
          - os: macos-15-intel
            label: macOS Intel installer
            artifact: BatikCraftStudio-Installer-macOS-x64
          - os: macos-15
            label: macOS Apple Silicon installer
            artifact: BatikCraftStudio-Installer-macOS-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $inno = "${env:ProgramFiles(x86)}\Inno Setup 6"
          $languages = Join-Path $inno "Languages"
          New-Item -ItemType Directory -Force -Path $languages | Out-Null
          $indonesian = Join-Path $languages "Indonesian.isl"
          if (-not (Test-Path $indonesian)) {
            Copy-Item (Join-Path $inno "Default.isl") $indonesian
          }

      - name: Install desktop build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[desktop-build]"

      - name: Build native desktop installer
        run: python scripts/build_desktop.py

      - name: Smoke test bundled AI dependency installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheelDirectory = Join-Path $env:RUNNER_TEMP "batikcraft-pip-smoke-wheel"
          $wheel = Join-Path $wheelDirectory "batikcraft_pip_smoke-0.0.1-py3-none-any.whl"
          New-Item -ItemType Directory -Force -Path $wheelDirectory | Out-Null

          @'
          import sys
          import zipfile
          from pathlib import Path

          wheel = Path(sys.argv[1])
          dist_info = "batikcraft_pip_smoke-0.0.1.dist-info"
          files = {
              "batikcraft_pip_smoke/__init__.py": "__version__ = '0.0.1'\n",
              "batikcraft_pip_smoke/cli.py": "def main():\n    return 0\n",
              f"{dist_info}/METADATA": (
                  "Metadata-Version: 2.1\n"
                  "Name: batikcraft-pip-smoke\n"
                  "Version: 0.0.1\n"
              ),
              f"{dist_info}/WHEEL": (
                  "Wheel-Version: 1.0\n"
                  "Generator: BatikCraft Studio CI\n"
                  "Root-Is-Purelib: true\n"
                  "Tag: py3-none-any\n"
              ),
              f"{dist_info}/entry_points.txt": (
                  "[console_scripts]\n"
                  "batikcraft-pip-smoke = batikcraft_pip_smoke.cli:main\n"
              ),
          }
          record_name = f"{dist_info}/RECORD"
          files[record_name] = "".join(f"{name},,\n" for name in [*files, record_name])
          with zipfile.ZipFile(wheel, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for name, content in files.items():
                  archive.writestr(name, content)
          print(wheel)
          '@ | python - $wheel

          $target = Join-Path $env:RUNNER_TEMP "batikcraft-ai-runtime-smoke"
          $log = Join-Path $env:RUNNER_TEMP "batikcraft-ai-runtime-smoke.log"
          $arguments = @(
            "--batikcraft-install-ai-dependencies",
            "--target", $target,
            "--log-file", $log,
            "--", $wheel
          )
          $process = Start-Process `
            -FilePath ".\dist\BatikCraftStudio.exe" `
            -ArgumentList $arguments `
            -Wait `
            -PassThru
          if (Test-Path $log) {
            Get-Content $log
          }
          if ($process.ExitCode -ne 0) {
            throw "Bundled AI dependency installer failed with exit code $($process.ExitCode)."
          }
          $installedPackage = Join-Path $target "batikcraft_pip_smoke\__init__.py"
          if (-not (Test-Path $installedPackage)) {
            throw "Bundled pip returned success but did not install the smoke-test wheel."
          }

      - name: Verify installer artifact
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          artifacts = [path for path in Path("release").iterdir() if path.is_file()]
          assert len(artifacts) == 1, artifacts
          artifact = artifacts[0]
          assert artifact.stat().st_size > 0, artifact
          assert artifact.suffix.lower() in {".exe", ".dmg", ".deb"}, artifact
          print(f"Verified installer {artifact} ({artifact.stat().st_size:,} bytes)")
          PY

      - name: Upload native installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all native installers
        uses: actions/download-artifact@v4
        with:
          pattern: BatikCraftStudio-Installer-*
          path: release-assets
          merge-multiple: true

      - name: Resolve release version
        id: release
        shell: bash
        env:
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${MANUAL_RELEASE_TAG}"
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0 or v0.1.0-beta.1" >&2
            exit 1
          fi

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release create "${RELEASE_TAG}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "BatikCraft Studio ${RELEASE_TAG}" \
            --generate-notes
