name: CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: |
          set -o pipefail
          ruff check . --output-format=concise 2>&1 | tee ruff.log

      - name: Upload lint log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-log-${{ github.run_id }}
          path: ruff.log

      - name: Test
        if: success()
        run: |
          set -o pipefail
          pytest 2>&1 | tee pytest.log

      - name: Upload test log on failure
        if: failure() && hashFiles('pytest.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ github.run_id }}
          path: pytest.log
