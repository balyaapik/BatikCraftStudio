[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "batikcraft-studio"
version = "0.1.0"
description = "Native Tkinter studio for manual and AI-assisted batik motif creation."
readme = "README.md"
requires-python = ">=3.11"
authors = [
  { name = "Balya Rochmadi" }
]
dependencies = [
  "Pillow>=10.4"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.5"
]

[project.scripts]
batikcraft-studio = "batikcraft_studio.__main__:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 101
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
